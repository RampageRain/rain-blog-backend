server:
  port: 8080

spring:
  application:
    name: rain-blog-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rain_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:

mybatis-plus:
  mapper-locations: classpath*:/generator/mapper/**/*.xml
  type-aliases-package: com.rain.blog.backend.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.rain.blog.backend: debug

knife4j:
  enable: true
  openapi:
    title: "Rain Blog Backend API"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.rain.blog.backend.controller
